<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sins & Commandments — Card Visual Test</title>

<!-- ===== LIBRARY 1: vanilla-tilt.js =====
     Loaded from a CDN (a public server hosting the file). This one library
     gives us BOTH the tilt effect AND the glare/sheen effect for free —
     we just attach it to an element and set a few numbers. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

<!-- ===== LIBRARY 2: GSAP =====
     This handles the flip animation — rotating the card 180 degrees
     smoothly when you click it. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- ===== LIBRARY 3: tsParticles =====
     Spawns and animates lots of small moving shapes (embers, mist,
     leaves, etc). This is the "bundle" build, which includes the
     extra shape types (like emoji/character shapes) we use for the
     leaves preset below. -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@3.5.0/tsparticles.bundle.min.js"></script>

<style>
  :root {
    --sin-color: #ff2d55;        /* crimson glow for the SIN card */
    --commandment-color: #2dd4ff; /* cyan glow for the COMMANDMENT card */
    --bg: #0b0b0f;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    font-family: system-ui, sans-serif;
    perspective: 1200px; /* gives 3D depth to child elements */
  }

  .cards-row {
    display: flex;
    gap: 80px;
  }

  .controls {
    display: flex;
    gap: 12px;
    color: #ccc;
    font-size: 14px;
    align-items: center;
  }
  select {
    background: #1a1a1a;
    color: white;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 4px 8px;
  }

  /* ---------- CARD SHELL ---------- */
  .card-wrap {
    width: 220px;
    height: 320px;
    cursor: pointer;
    position: relative; /* so the particle layer can sit behind it */
  }

  /* The particle canvas sits IN FRONT of the card, extending past its
     edges, so embers/mist/etc. visibly drift across the card artwork.
     pointer-events: none means clicks and mouse-tilt still reach the
     card underneath — this layer is purely visual, it doesn't block
     interaction. */
  .particle-layer {
    position: absolute;
    inset: -40px;
    z-index: 5;
    pointer-events: none;
  }

  /* Blurs the whole particle layer so overlapping circles melt into one
     continuous hazy volume instead of reading as distinct dots/bubbles.
     This is what turns "floating circles" into something that actually
     looks like mist or smoke. */
  .particle-layer.foggy {
    filter: blur(16px);
  }

  /* This is the element GSAP will rotate for the flip.
     transform-style: preserve-3d means its children keep their
     3D position instead of flattening. */
  .card-flip {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
  }

  /* Front and back faces sit in the exact same spot, but the "back"
     one is pre-rotated 180deg so it only becomes visible once the
     whole card has flipped. backface-visibility: hidden hides
     whichever face is currently pointed away from the viewer. */
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    color: white;
    overflow: hidden;
  }

  .card-face.back {
    transform: rotateY(180deg);
  }

  /* ---------- COLOR + GLOW PER CARD ---------- */
  .sin-card .card-face.front {
    background: #111;
    border: 2px solid var(--sin-color);
    box-shadow: 0 0 25px var(--sin-color), 0 0 60px rgba(255,45,85,0.35);
  }
  .commandment-card .card-face.front {
    background: #0a1a2e;
    border: 2px solid var(--commandment-color);
    box-shadow: 0 0 25px var(--commandment-color), 0 0 60px rgba(45,212,255,0.35);
  }
  /* the "back" faces (what you see after flipping) — just a placeholder
     until we have real front artwork */
  .card-face.back {
    background: #1a1a1a;
    border: 2px dashed #555;
    color: #888;
    font-size: 16px;
  }

  .card-face.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }

  label {
    color: #ccc;
    text-align: center;
    display: block;
    margin-top: 14px;
    font-size: 14px;
  }
</style>
</head>
<body>

  <div class="controls">
    <label for="sinEffect" style="margin:0;">Sin card effect:</label>
    <select id="sinEffect">
      <option value="none">None</option>
      <option value="embers" selected>Embers</option>
      <option value="mist">Mist</option>
      <option value="smoke">Smoke</option>
      <option value="snow">Snow</option>
      <option value="leaves">Leaves</option>
      <option value="fireflies">Fireflies</option>
    </select>
    <label for="commandmentEffect" style="margin:0;">Commandment card effect:</label>
    <select id="commandmentEffect">
      <option value="none">None</option>
      <option value="embers">Embers</option>
      <option value="mist">Mist</option>
      <option value="smoke">Smoke</option>
      <option value="snow" selected>Snow</option>
      <option value="leaves">Leaves</option>
      <option value="fireflies">Fireflies</option>
    </select>
  </div>

  <div class="cards-row">

    <div>
      <div class="card-wrap sin-card" id="sinCard">
        <div id="sinParticles" class="particle-layer"></div>
        <div class="card-flip">
          <div class="card-face front">
            <img src="assets/cards/SIN CARD.png" alt="Sin card back">
          </div>
          <div class="card-face back">front art<br>goes here later</div>
        </div>
      </div>
      <label>Sin card — click to flip</label>
    </div>

    <div>
      <div class="card-wrap commandment-card" id="commandmentCard">
        <div id="commandmentParticles" class="particle-layer"></div>
        <div class="card-flip">
          <div class="card-face front">
            <img src="assets/cards/COMMANDMENT CARD.png" alt="Commandment card back">
          </div>
          <div class="card-face back">front art<br>goes here later</div>
        </div>
      </div>
      <label>Commandment card — click to flip</label>
    </div>

  </div>


<script>
  // ---------- STEP 1: Tilt + Glare ----------
  // VanillaTilt.init attaches the effect to every element matching this
  // selector. max = how many degrees it tilts. speed = how fast it
  // reacts. glare + max-glare = turns on the light-sheen streak.
  VanillaTilt.init(document.querySelectorAll(".card-wrap"), {
    max: 15,
    speed: 400,
    glare: true,
    "max-glare": 0.3,
    perspective: 1000,
  });

  // ---------- STEP 2: Flip on click ----------
  // We track flip state per card, and use GSAP to animate the rotateY
  // from 0 to 180 (or back) smoothly instead of it snapping instantly.
  function makeFlippable(wrapId) {
    const wrap = document.getElementById(wrapId);
    const flipEl = wrap.querySelector(".card-flip");
    let flipped = false;

    wrap.addEventListener("click", () => {
      flipped = !flipped;
      gsap.to(flipEl, {
        rotateY: flipped ? 180 : 0,
        duration: 0.6,
        ease: "power2.inOut",
      });
    });
  }
  makeFlippable("sinCard");
  makeFlippable("commandmentCard");

  // ---------- STEP 3: Particle effects ----------
  // Each of these is a small config object describing one particle
  // system: how many particles, what shape/color, how they move.
  // Swapping effects is just swapping which config gets loaded.

  const emberConfig = {
    fpsLimit: 60,
    particles: {
      number: { value: 40 },
      // Brightened ~5% (blended each color 5% toward white)
      color: { value: ["#ff5638", "#ff9038", "#ffd238"] },
      shape: { type: "circle" },
      opacity: {
        value: { min: 0.2, max: 0.84 },  // slightly higher ceiling = more glow
        animation: { enable: true, speed: 1, startValue: "max", destroy: "min" }
      },
      size: { value: { min: 1, max: 3 } },
      move: {
        enable: true,
        speed: { min: 1.3, max: 3.2 },  // ~30% faster than before
        direction: "top",       // drifts upward, like heat rising
        random: true,           // slight left/right wobble
        straight: false,
        outModes: { default: "destroy", top: "destroy" }
      },
    },
    emitters: {
      position: { x: 50, y: 100 },  // spawn from the bottom of the layer
      rate: { quantity: 2, delay: 0.15 },
      size: { width: 100, height: 0 }
    },
    background: { color: "transparent" },
  };

  const mistConfig = {
    fpsLimit: 60,
    particles: {
      number: { value: 10 },
      color: { value: "#dbe4ec" },
      shape: { type: "circle" },
      opacity: { value: { min: 0.12, max: 0.26 } },  // higher, since blur softens perceived opacity
      size: { value: { min: 90, max: 160 } },         // bigger + more overlap = smoother blend
      move: {
        enable: true,
        speed: { min: 0.15, max: 0.4 },
        direction: "right",     // slow horizontal drift, like fog rolling by
        random: true,
        straight: false,
        outModes: { default: "out" }
      },
    },
    background: { color: "transparent" },
  };

  // Smoke: like mist, but darker, denser, and rising instead of drifting
  // sideways — reads as smoke curling up rather than ground fog.
  const smokeConfig = {
    fpsLimit: 60,
    particles: {
      number: { value: 8 },
      color: { value: "#3f3f46" },
      shape: { type: "circle" },
      opacity: { value: { min: 0.14, max: 0.3 } },
      size: { value: { min: 100, max: 180 } },
      move: {
        enable: true,
        speed: { min: 0.2, max: 0.5 },
        direction: "top",
        random: true,
        straight: false,
        outModes: { default: "out" }
      },
    },
    background: { color: "transparent" },
  };

  // Snow: small white circles falling straight down with a gentle sway.
  const snowConfig = {
    fpsLimit: 60,
    particles: {
      number: { value: 60 },
      color: { value: "#ffffff" },
      shape: { type: "circle" },
      opacity: { value: { min: 0.4, max: 0.9 } },
      size: { value: { min: 1, max: 4 } },
      move: {
        enable: true,
        speed: { min: 0.5, max: 1.5 },
        direction: "bottom",
        random: true,          // gives the side-to-side sway
        straight: false,
        outModes: { default: "out" }
      },
    },
    background: { color: "transparent" },
  };

  const leavesConfig = {
    fpsLimit: 60,
    particles: {
      number: { value: 18 },
      color: { value: ["#b5651d", "#8a9a5b", "#c2703d"] },
      // "character" (not "char") is the correct shape type name, and its
      // settings must live under shape.options.character — nesting it
      // directly under shape.character (what I had before) left the
      // library looking for settings at a path that didn't exist, which
      // is exactly what threw the "reading 'font'" error.
      shape: {
        type: "character",
        options: {
          character: { value: ["🍂", "🍃"], font: "Verdana", style: "", weight: "400" }
        }
      },
      opacity: { value: 0.85 },
      size: { value: { min: 12, max: 20 } },
      rotate: {
        value: { min: 0, max: 360 },
        animation: { enable: true, speed: 8 }   // leaves spin as they fall
      },
      move: {
        enable: true,
        speed: { min: 0.6, max: 1.4 },
        direction: "bottom",    // falls downward
        random: true,           // sways side to side while falling
        straight: false,
        outModes: { default: "out" }
      },
    },
    background: { color: "transparent" },
  };

  // Fireflies: tiny warm dots that wander slowly with no fixed direction
  // and pulse in and out of visibility — a twinkle/glimmer effect.
  const firefliesConfig = {
    fpsLimit: 60,
    particles: {
      number: { value: 12 },
      color: { value: ["#fff3b0", "#ffe066"] },
      shape: { type: "circle" },
      opacity: {
        value: { min: 0.1, max: 0.9 },
        animation: { enable: true, speed: 2, sync: false }  // random twinkle timing per particle
      },
      size: { value: { min: 1.5, max: 3 } },
      move: {
        enable: true,
        speed: { min: 0.3, max: 0.8 },
        direction: "none",     // wanders freely, no set direction
        random: true,
        straight: false,
        outModes: { default: "bounce" }  // stays within the layer, bounces at edges
      },
    },
    background: { color: "transparent" },
  };

  const effectConfigs = {
    embers: emberConfig,
    mist: mistConfig,
    smoke: smokeConfig,
    snow: snowConfig,
    leaves: leavesConfig,
    fireflies: firefliesConfig,
  };

  // Tracks the currently-running particle instance for each card slot,
  // so we can properly destroy it before loading a new one. We store
  // the actual Container object returned by tsParticles.load() instead
  // of trying to look it up later — much more reliable.
  const activeContainers = { sinParticles: null, commandmentParticles: null };

  async function setEffect(containerId, effectName) {
    if (activeContainers[containerId]) {
      activeContainers[containerId].destroy();
      activeContainers[containerId] = null;
    }

    // Only mist and smoke get the blur treatment — everything else
    // (embers, snow, leaves, fireflies) should stay crisp.
    const layerEl = document.getElementById(containerId);
    layerEl.classList.toggle("foggy", effectName === "mist" || effectName === "smoke");

    if (effectName === "none") return;

    const container = await tsParticles.load({ id: containerId, options: effectConfigs[effectName] });
    activeContainers[containerId] = container;
  }

  document.getElementById("sinEffect").addEventListener("change", (e) => {
    setEffect("sinParticles", e.target.value);
  });
  document.getElementById("commandmentEffect").addEventListener("change", (e) => {
    setEffect("commandmentParticles", e.target.value);
  });

  // ---------- THE MISSING STEP ----------
  // Loading the tsParticles bundle script only makes the pieces
  // (shapes, movement, emitters, etc.) AVAILABLE — it doesn't wire them
  // up automatically. loadFull() is the one-time call that registers
  // every plugin onto the engine. It must finish before the very first
  // tsParticles.load() call, or nothing will render (with no visible
  // error unless you check the browser console).
  (async () => {
    await loadFull(tsParticles);
    // Load the initial defaults now that the engine is actually ready
    setEffect("sinParticles", "embers");
    setEffect("commandmentParticles", "snow");
  })();

</script>

</body>
</html>
